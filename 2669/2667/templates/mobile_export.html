{% extends "base.html" %}
{% block title %}手机版结果{% endblock %}
{% block nav_mobile %}active{% endblock %}

{% block content %}
<div class="export-shell">
    <section class="hero-board">
        <div class="hero-copy">
            <div class="hero-kicker">MOBILE EXPORT</div>
            <h1>手机版结果导出</h1>
            <p>将当前审计结果整理为更适合手机查看的独立页面，可直接下载后发送到移动端打开。</p>
        </div>
    </section>

    <section class="export-card">
        <div class="export-actions">
            <a href="/export/mobile" class="export-btn">
                <i class="bi bi-download"></i>
                下载手机版结果
            </a>
            <a href="/export/qrcode" class="export-btn secondary">
                <i class="bi bi-qr-code"></i>
                查看二维码
            </a>
        </div>
        <div class="export-note">如当前批次尚未运行模型，下载时会提示暂无数据。</div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<style>
.export-shell { display: flex; flex-direction: column; gap: 18px; }
.hero-board {
    padding: 22px 24px;
    border: 1px solid rgba(185, 214, 243, 0.9);
    border-radius: 10px;
    background:
        radial-gradient(circle at top left, rgba(57, 152, 255, 0.18), rgba(57, 152, 255, 0) 34%),
        linear-gradient(135deg, rgba(255,255,255,0.97) 0%, rgba(247,251,255,0.98) 52%, rgba(238,246,255,0.96) 100%);
    box-shadow: 0 18px 36px rgba(27, 72, 122, 0.08);
}
.hero-kicker { display: inline-block; color: #2782d6; font-size: 11px; font-weight: 800; letter-spacing: 0.14em; }
.hero-copy h1 { margin: 10px 0 8px; font-size: 30px; line-height: 1.08; color: #143a61; font-weight: 800; }
.hero-copy p { margin: 0; max-width: 760px; color: #667b90; font-size: 14px; line-height: 1.7; }
.export-card {
    background: #fff;
    border: 1px solid #dce8f6;
    border-radius: 12px;
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.04);
    padding: 24px 26px;
}
.export-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.export-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-radius: 999px;
    background: linear-gradient(135deg, #1f89df, #3ea3ff);
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 800;
}
.export-btn.secondary {
    background: #f4f8fc;
    color: #1f89df;
    border: 1px solid #cfe2f6;
}
.export-note { margin-top: 14px; color: #8da0b2; font-size: 13px; }
</style>
{% endblock %}
